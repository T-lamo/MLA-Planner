<html>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <h2>Bonjour {{ username }},</h2>
    <p>Vous avez été programmé pour une nouvelle session de travail sur <strong>Planning MLA</strong>.</p>
    <div style="background: #f4f4f4; padding: 15px; border-radius: 8px;">
        <p><strong>Date :</strong> {{ date }}</p>
        <p><strong>Horaire :</strong> {{ start_time }} - {{ end_time }}</p>
        <p><strong>Lieu :</strong> {{ location }}</p>
    </div>
    <p>Merci de vous connecter à l'application pour confirmer votre présence.</p>
</body>
</html>
