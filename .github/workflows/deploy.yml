name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/mla/deploy.sh

      - name: Health check
        run: |
          sleep 15
          curl -k --fail --retry 5 --retry-delay 5 \
            https://${{ secrets.VPS_HOST }}/api/health \
            && echo "✅ Health check passed"
