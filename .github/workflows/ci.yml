name: MLA Monorepo Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --- JOB 1 : LE FILTRE DE QUALITÉ ---
  quality-assurance:
    name: Check ${{ matrix.component }} (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: ui-core
            task: build
          - component: backend
            task: lint
          - component: backend
            task: test
          - component: frontend
            task: lint-typecheck
          - component: frontend
            task: test

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: pass_test
          POSTGRES_DB: mla_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        if: matrix.component != 'backend'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Backend
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node (Frontend & UI)
        if: matrix.component == 'frontend' || matrix.component == 'ui-core'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Tools
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            make -C backend install
            pip install pytest pytest-cov psycopg2-binary black isort mypy pylint
          else
            if [ "${{ matrix.component }}" = "frontend" ]; then
              make -C packages/ui-core install
              make -C packages/ui-core build
              make -C frontend install
            else
              make -C packages/ui-core install
            fi
          fi

      - name: Execute Task
        env:
          DATABASE_URL: "postgresql+psycopg2://user_test:pass_test@localhost:5432/mla_db_test"
          ENV: testing
          JWT_SECRET_KEY: "test_secret_key_for_ci_only"
        run: |
          if [ "${{ matrix.component }}" = "ui-core" ]; then
            make -C packages/ui-core build
          elif [ "${{ matrix.component }}" = "backend" ]; then
            if [ "${{ matrix.task }}" = "lint" ]; then
              make -C backend lint
            elif [ "${{ matrix.task }}" = "test" ]; then
              cd backend/src && \
                DATABASE_URL=$DATABASE_URL \
                ENV=testing \
                PYTHONPATH=. \
                pytest \
                  --log-cli-level=INFO \
                  --cov=. \
                  --cov-report=term-missing \
                  --cov-report=xml:coverage.xml \
                  -v
            fi
          elif [ "${{ matrix.component }}" = "frontend" ]; then
            if [ "${{ matrix.task }}" = "lint-typecheck" ]; then
              make -C frontend lint
              make -C frontend typecheck
            elif [ "${{ matrix.task }}" = "test" ]; then
              make -C frontend test
            fi
          fi

      # Upload coverage vers Codecov uniquement pour le job backend/test
      - name: Upload coverage to Codecov
        if: matrix.component == 'backend' && matrix.task == 'test'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/src/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # --- JOB 2 : BUILD ---
  build-frontend:
    needs: quality-assurance
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Build UI & Frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
        run: |
          make -C packages/ui-core install
          make -C packages/ui-core build
          cd frontend && pnpm install && pnpm nuxi generate

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # --- JOB 3 : DEPLOY BACK ---
  deploy-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️  Secret RENDER_DEPLOY_HOOK non configuré — déploiement ignoré."
            exit 0
          fi
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for backend health
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "⚠️  Secret BACKEND_URL non configuré — health check ignoré."
            exit 0
          fi
          echo "Attente de la disponibilité du backend (max 15 min)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 20 \
              "${{ secrets.BACKEND_URL }}/health") || STATUS="000"
            echo "Tentative $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend opérationnel."
              exit 0
            fi
            sleep 30
          done
          echo "❌ Timeout : le backend n'a pas répondu dans les temps."
          exit 1

  # --- JOB 4 : DEPLOY FRONT ---
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./frontend/dist"
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
