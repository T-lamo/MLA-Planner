name: MLA Monorepo Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --- JOB 1 : LE FILTRE DE QUALITÉ ---
  quality-assurance:
    name: Check ${{ matrix.component }} (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true 
      matrix:
        include:
          - component: ui-core
            task: build
          - component: backend
            task: lint
          - component: backend
            task: test
          - component: frontend
            task: lint-typecheck
          - component: frontend
            task: test

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: pass_test
          POSTGRES_DB: mla_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Backend
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Setup Node (Frontend & UI)
        if: matrix.component == 'frontend' || matrix.component == 'ui-core'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tools
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            make -C backend install
            pip install pytest pytest-cov psycopg2-binary black isort mypy pylint
          else
            npm install -g pnpm
            # Pour le frontend, on a OBLIGATOIREMENT besoin de l'UI buildée
            if [ "${{ matrix.component }}" = "frontend" ]; then
              make -C packages/ui-core install
              make -C packages/ui-core build
              make -C frontend install
            else
              make -C packages/ui-core install
            fi
          fi

      - name: Execute Task
        env:
          DATABASE_URL: "postgresql+psycopg2://user_test:pass_test@localhost:5432/mla_db_test"
          ENV: testing
          JWT_SECRET_KEY: "test_secret_key_for_ci_only"
        run: |
          if [ "${{ matrix.component }}" = "ui-core" ]; then
            make -C packages/ui-core build
          elif [ "${{ matrix.component }}" = "backend" ]; then
            if [ "${{ matrix.task }}" = "lint" ]; then
              make -C backend lint
            elif [ "${{ matrix.task }}" = "test" ]; then
              make -C backend test DB_TEST_URL=$DATABASE_URL
            fi
          elif [ "${{ matrix.component }}" = "frontend" ]; then
            if [ "${{ matrix.task }}" = "lint-typecheck" ]; then 
              make -C frontend lint
              make -C frontend typecheck 
            elif [ "${{ matrix.task }}" = "test" ]; then 
              make -C frontend test
            fi
          fi

  # --- JOB 2 : BUILD ---
  build-frontend:
    needs: quality-assurance
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build UI & Frontend
        # NUXT_PUBLIC_API_BASE doit être injecté ici (au moment du generate),
        # pas dans l'étape deploy — les valeurs runtimeConfig.public sont
        # embarquées dans le bundle statique à la compilation.
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
        run: |
          pnpm install -g pnpm
          # On build l'UI d'abord sinon Nuxt ne trouvera pas les composants
          make -C packages/ui-core install
          make -C packages/ui-core build
          cd frontend && pnpm install && pnpm nuxi generate
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # --- JOB 3 : DEPLOY BACK ---
  deploy-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # Render rebuild + alembic upgrade head prend 2-4 min sur le plan free.
      # On poll /health toutes les 15s jusqu'à ce que le backend réponde 200
      # (max 10 tentatives = ~2.5 min), évitant que le frontend soit livré
      # pendant que les migrations tournent encore.
      - name: Wait for backend health
        run: |
          echo "Attente de la disponibilité du backend..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health" || echo "000")
            echo "Tentative $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend opérationnel."
              exit 0
            fi
            sleep 15
          done
          echo "Timeout : le backend n'a pas répondu dans les temps."
          exit 1

  # --- JOB 4 : DEPLOY FRONT ---
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './frontend/dist'
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}